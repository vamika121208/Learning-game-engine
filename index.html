<!DOCTYPE html>
<html>

<head>
<title>Learning Game Engine</title>

<style>

body{
  font-family: Chilanka, sans-serif;
  background:#290256;
  text-align:center;
  margin-top:80px;
}

h1{
  color:#1be6ed;
}

#game{
  background:rgb(89, 245, 146);
  padding:40px;
  width:400px;
  margin:auto;
  border-radius:10px;
  box-shadow:0px 4px 10px rgba(0,0,0,0.1);
}

button{
  margin:10px;
  padding:10px 20px;
  font-size:16px;
  border:none;
  background:#044f82;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

button:hover{
  background:#0e94ed;
}
.correct{
  color:green;
  font-weight:bold;
  font-size:18px;
  margin-top:10px;
}

.wrong{
  color:red;
  font-weight:bold;
  font-size:18px;
  margin-top:10px;
}
</style>

</head>

<body>

<h1>Learning Game Engine Demo</h1>

<div id="game"></div>

<script type="module" src="main.js"></script>

</body>

</html>
